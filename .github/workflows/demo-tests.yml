name: Demo tests (fast)

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  demo-tests:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'
      - name: Install minimal test deps
        run: |
          python -m pip install --upgrade pip
          pip install pytest
      - name: Run demo tests (fast)
        working-directory: packages/backend/server
        run: |
          python -m pytest -q tests_fast/test_demo_fast.py -q
