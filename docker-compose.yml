version: '3.8'

services:
  # Ollama — Local LLM inference
  ollama:
    image: ollama/ollama:latest
    container_name: eva-ollama
    ports:
      - "11434:11434"
    volumes:
      - ollama_data:/root/.ollama
    restart: unless-stopped

  # Python Backend — Flask + AI Agent
  python-backend:
    build:
      context: ./packages/backend
      dockerfile: Dockerfile.python
    container_name: eva-backend
    ports:
      - "5000:5000"
    env_file:
      - ./packages/backend/server/.env
    environment:
      - OLLAMA_HOST=http://ollama:11434
    depends_on:
      - ollama
    volumes:
      - ./packages/backend/server/uploads:/app/uploads
      - ./packages/backend/server/data:/app/data
    restart: unless-stopped

volumes:
  ollama_data:
